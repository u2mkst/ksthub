<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<style>
:root {
  --main:#0A84FF;
  --bg:#f2f4f8;
  --card:#ffffff;
  --text:#111;
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
}

.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#fff;
}

.header {
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:linear-gradient(135deg,#0A84FF,#5AC8FA);
  color:white;
}

.container {
  padding:20px;
  max-width:520px;
  margin:auto;
}

.card {
  background:var(--card);
  padding:18px;
  border-radius:22px;
  margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:14px;
  border:1px solid #ddd;
}

button {
  background:var(--main);
  color:white;
  border:none;
}

.timetable {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.period {
  padding:12px;
  border-radius:14px;
  background:linear-gradient(135deg,#0A84FF,#5AC8FA);
  color:white;
  font-size:14px;
}

.toggle {
  position:fixed;
  bottom:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:#333;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">KST HUB</div>

<div class="container" id="loginPage">
  <div class="card">
    <h3>로그인</h3>
    <input id="userId" placeholder="ufes1234">
    <button id="loginBtn">로그인</button>
  </div>
</div>

<div class="container" id="setupPage" style="display:none">
  <div class="card">
    <h3>초기 설정</h3>
    <input id="schoolInput" placeholder="학교 검색" oninput="searchSchool()">
    <div id="schoolList"></div>
    <input id="grade" placeholder="학년">
    <input id="class" placeholder="반">
    <button onclick="saveInfo()">저장</button>
  </div>
</div>

<div class="container" id="mainPage" style="display:none">

  <div class="card">
    <h3>🍽 급식</h3>
    <div id="meal"></div>
  </div>

  <div class="card">
    <h3>📚 시간표</h3>
    <div id="time" class="timetable"></div>
  </div>

  <div class="card">
    <button onclick="go('https://www.u2math.co.kr/Login/Index')">유투엠</button>
    <button onclick="go('https://student.mathflat.com/#/login?_si=2')">매쓰플랫</button>
  </div>

</div>

<div class="toggle" onclick="toggleDark()">🌙</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyDa50OQMq30K_6IcA-fm0IAUO8S8UYXe3E",
  authDomain: "ksthub-4840e.firebaseapp.com",
  projectId: "ksthub-4840e",
  storageBucket: "ksthub-4840e.firebasestorage.app",
  messagingSenderId: "688445578736",
  appId: "1:688445578736:web:6f1e29e1f3bae31c215135",
  measurementId: "G-VL8CNHLPL0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const messaging = getMessaging(app);

const API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc";

let currentUser = localStorage.getItem("user");
let userData = null;
let schoolCode="", atpt="";

if(location.protocol !== "file:"){
  requestPermission();
}

async function requestPermission(){
  try{
    const permission = await Notification.requestPermission();
    if(permission !== "granted") return;

    const token = await getToken(messaging,{
      vapidKey:"BBy2KlFgNR2qmtS_1-EvtW9ClWEgk98RR4wfPRrIg7IuSo1n2A5xNhheQev_FBd-egHRjplo3cW9Gcyf95pnfd0"
    });

    console.log("토큰:",token);

    if(token && currentUser){
      await set(ref(db,"tokens/"+currentUser),{
        token:token
      });
    }

  }catch(e){
    console.error(e);
  }
}

onMessage(messaging,(payload)=>{
  alert(payload.notification.title+"\n"+payload.notification.body);
});

if(currentUser) autoLogin();

async function autoLogin(){
  const snap = await get(ref(db,"users/"+currentUser));
  if(snap.exists()){ userData=snap.val(); showMain(); }
}

window.login = async function(){
  const id = userId.value;
  if(!/^ufes\d+$/.test(id)) return alert("형식 오류");

  currentUser=id;
  localStorage.setItem("user",id);

  const snap = await get(ref(db,"users/"+id));
  if(snap.exists()){ userData=snap.val(); showMain(); }
  else { loginPage.style.display="none"; setupPage.style.display="block"; }
}

window.searchSchool = async function(){
  const q = schoolInput.value;
  if(q.length<2) return;

  const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${API_KEY}&Type=json&Type=json&SCHUL_NM=${q}`);
  const data = await res.json();
  const list = data.schoolInfo?.[1]?.row || [];

  schoolList.innerHTML="";
  list.forEach(s=>{
    const div=document.createElement("div");
    div.innerText=s.SCHUL_NM;
    div.onclick=()=>{
      schoolInput.value=s.SCHUL_NM;
      schoolCode=s.SD_SCHUL_CODE;
      atpt=s.ATPT_OFCDC_SC_CODE;
      schoolList.innerHTML="";
    };
    schoolList.appendChild(div);
  });
}

window.saveInfo = async function(){
  const grade=document.getElementById("grade").value;
const classN=document.getElementById("class").value;

  await set(ref(db,"users/"+currentUser),{schoolCode,atpt,grade,classN});
  userData={schoolCode,atpt,grade,classN};
  showMain();
}

function showMain(){
  loginPage.style.display="none";
  setupPage.style.display="none";
  mainPage.style.display="block";
  loadMeal(); loadTime();
}

function today(){return new Date().toISOString().slice(0,10).replace(/-/g,'');}

async function loadMeal(){
  const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&ATPT_OFCDC_SC_CODE=${userData.atpt}&SD_SCHUL_CODE=${userData.schoolCode}&MLSV_YMD=${today()}`);
  const data = await res.json();
  const meal=data.mealServiceDietInfo?.[1]?.row?.[0]?.DDISH_NM;
  mealEl.innerHTML=meal?meal.replace(/<br\/>/g,'<br>'):"없음";
}

async function loadTime(){
  const res = await fetch(`https://open.neis.go.kr/hub/hisTimetable?KEY=${API_KEY}&ATPT_OFCDC_SC_CODE=${userData.atpt}&SD_SCHUL_CODE=${userData.schoolCode}&GRADE=${userData.grade}&CLASS_NM=${userData.classN}&ALL_TI_YMD=${today()}`);
  const data = await res.json();
  const rows=data.hisTimetable?.[1]?.row;

  if(!rows){ timeEl.innerHTML="없음"; return; }

  timeEl.innerHTML = rows.map(r=>
    `<div class="period">${r.PERIO}교시<br>${r.ITRT_CNTNT}</div>`
  ).join('');
}

window.go=(url)=>window.open(url);
window.toggleDark=()=>document.body.classList.toggle("dark");

const mealEl=document.getElementById("meal");
const timeEl=document.getElementById("time");
</script>

</body>
</html>
