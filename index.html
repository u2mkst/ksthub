<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<style>
:root{
 --bg:#f8fbff;
 --card:#fff;
 --text:#111;
 --primary:#2563eb;
}
.dark{
 --bg:#020617;
 --card:#0f172a;
 --text:#e2e8f0;
 --primary:#3b82f6;
}
body{margin:0;font-family:Pretendard;background:var(--bg);color:var(--text);}
.container{max-width:420px;margin:auto;padding:16px;}
.card{background:var(--card);border-radius:16px;padding:16px;margin-top:12px;}

#welcome{font-size:22px;font-weight:700;}

.btn{width:100%;height:44px;border:none;border-radius:12px;background:var(--primary);color:white;margin-top:10px;}
.sub-btn{height:32px;font-size:12px;background:#e0ecff;color:#2563eb;}
.dark .sub-btn{background:#1e3a8a;color:white;}

.week-card{font-size:13px;padding:10px;margin-top:8px;border-radius:10px;background:#eef5ff;}
.dark .week-card{background:#1e293b;}

.floating{position:fixed;bottom:20px;width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.share-btn{left:20px;background:#fee500;}
.dark-btn{right:20px;background:#111;color:white;}

#shareModal,#mypage{
 display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0008;
}
.modal-box{
 background:var(--card);margin:80px 20px;padding:20px;border-radius:16px;
}
input,select{
 width:100%;height:40px;margin-top:8px;border-radius:8px;border:1px solid #ddd;padding-left:8px;
}
#schoolList div{
 padding:8px;border-bottom:1px solid #eee;cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<h2>KST HUB</h2>

<div class="card">
<p id="welcome"></p>
<p id="schoolInfo"></p>
</div>

<div class="card">
<h4>🍱 오늘 급식</h4>
<div id="meal"></div>
</div>

<div class="card">
<button class="btn" onclick="openMy()">마이페이지</button>
</div>

</div>

<div class="floating share-btn" onclick="openShare()">💬</div>
<div class="floating dark-btn" onclick="toggleDark()">🌙</div>

<!-- 공유 -->
<div id="shareModal">
 <div class="modal-box">
  <button class="btn" onclick="shareToday()">오늘 급식 공유</button>
  <button class="btn sub-btn" onclick="closeShare()">닫기</button>
 </div>
</div>

<!-- 마이페이지 -->
<div id="mypage">
 <div class="modal-box">
  <h3>마이페이지</h3>

  <input id="editNick" placeholder="닉네임">

  <input id="schoolInput" placeholder="학교 검색">
  <div id="schoolList"></div>

  <select id="editGrade"></select>
  <select id="editClass"></select>

  <button class="btn" onclick="saveMy()">저장</button>
  <button class="btn" onclick="logout()">로그아웃</button>
  <button class="btn sub-btn" onclick="closeMy()">닫기</button>
 </div>
</div>

<script>
// 🔥 직접 입력
const firebaseConfig = {
  apiKey: "AIzaSyDa50OQMq30K_6IcA-fm0IAUO8S8UYXe3E",
  authDomain: "ksthub-4840e.firebaseapp.com",
  databaseURL: "https://ksthub-4840e-default-rtdb.firebaseio.com",
  projectId: "ksthub-4840e",
  storageBucket: "ksthub-4840e.firebasestorage.app",
  messagingSenderId: "688445578736",
  appId: "1:688445578736:web:6f1e29e1f3bae31c215135",
  measurementId: "G-VL8CNHLPL0"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const NEIS_API_KEY="19f78fd07bfb4243a6333e7bf4641bfc";
Kakao.init("1074f182720545c67909372a924b23bb");

let user, selectedSchool=null;

// 다크모드 저장
if(localStorage.getItem("dark")=="1") document.body.classList.add("dark");

// 급식 정리
function cleanMeal(t){
 return t.replace(/<br\/>/g,"\n").replace(/\([0-9.]+\)/g,"").replace(/[0-9.]/g,"");
}

// 로그인 체크
window.onload=async()=>{
 const id=localStorage.getItem("loginUser");
 if(!id){location.href="login.html";return;}

 const doc=await db.collection("users").doc(id).get();
 user=doc.data();

 welcome.innerText=user.nickname+"님 반가워요";
 schoolInfo.innerText=`${user.schoolName} ${user.grade}학년 ${user.classNum}반`;

 loadToday();
 initSelect();
};

// 급식
async function loadToday(){
 const today=new Date().toISOString().slice(0,10).replace(/-/g,'');

 const res=await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${user.officeCode}&SD_SCHUL_CODE=${user.schoolCode}&MLSV_YMD=${today}`);
 const data=await res.json();

 meal.innerHTML=data.mealServiceDietInfo
 ? cleanMeal(data.mealServiceDietInfo[1].row[0].DDISH_NM).replace(/\n/g,"<br>")
 : "없음";
}

// 공유
function openShare(){shareModal.style.display="block";}
function closeShare(){shareModal.style.display="none";}

function shareToday(){
 Kakao.Share.sendDefault({
  objectType:'text',
  text:`${user.schoolName}\n오늘 급식\n\n${meal.innerText}`,
  link:{mobileWebUrl:location.origin,webUrl:location.origin}
 });
}

// 다크모드
function toggleDark(){
 document.body.classList.toggle("dark");
 localStorage.setItem("dark",document.body.classList.contains("dark")?"1":"0");
}

// 마이페이지
function openMy(){
 mypage.style.display="block";
 editNick.value=user.nickname;
 schoolInput.value=user.schoolName;
}

function closeMy(){mypage.style.display="none";}

// 학년/반
function initSelect(){
 for(let i=1;i<=6;i++) editGrade.innerHTML+=`<option>${i}</option>`;
 for(let i=1;i<=15;i++) editClass.innerHTML+=`<option>${i}</option>`;
}

// 🔥 학교 검색
schoolInput.addEventListener("input", async ()=>{
 const keyword=schoolInput.value;
 if(keyword.length<2) return;

 const res=await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${keyword}`);
 const data=await res.json();

 schoolList.innerHTML="";

 if(!data.schoolInfo) return;

 data.schoolInfo[1].row.forEach(s=>{
  const div=document.createElement("div");
  div.innerText=`${s.SCHUL_NM} (${s.LCTN_SC_NM})`;

  div.onclick=()=>{
   selectedSchool=s;
   schoolInput.value=s.SCHUL_NM;
   schoolList.innerHTML="";
  };

  schoolList.appendChild(div);
 });
});

// 저장
async function saveMy(){
 await db.collection("users").doc(localStorage.getItem("loginUser")).update({
  nickname:editNick.value,
  schoolName:selectedSchool?.SCHUL_NM || user.schoolName,
  schoolCode:selectedSchool?.SD_SCHUL_CODE || user.schoolCode,
  officeCode:selectedSchool?.ATPT_OFCDC_SC_CODE || user.officeCode,
  grade:editGrade.value,
  classNum:editClass.value
 });

 alert("저장 완료");
 location.reload();
}

function logout(){
 localStorage.removeItem("loginUser");
 location.href="login.html";
}
</script>
</body>
</html>
