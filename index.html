<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<style>
body {
 font-family: Pretendard;
 background: linear-gradient(180deg,#eaf2ff,#ffffff);
 margin:0;
}

.container {
 max-width:420px;
 margin:auto;
 padding:16px;
}

.card {
 background:white;
 border-radius:18px;
 padding:18px;
 margin-top:14px;
 box-shadow:0 6px 18px rgba(0,80,255,0.08);
}

input, select, button {
 width:100%;
 height:48px;
 margin-top:10px;
 border-radius:12px;
 border:1px solid #dbeafe;
 box-sizing:border-box;
 font-size:15px;
}

/* 버튼 애니메이션 */
button {
 background:#2563eb;
 color:white;
 border:none;
 font-weight:600;
 transition:0.2s;
}

button:hover {
 opacity:0.9;
}

button:active {
 transform:scale(0.96);
}

.loading {
 opacity:0.6;
 pointer-events:none;
}

#welcome {
 font-size:24px;
 font-weight:800;
 color:#1e3a8a;
}

.meal-box {
 background:#f1f5ff;
 border-radius:12px;
 padding:12px;
 margin-top:10px;
 line-height:1.6;
}

.time-row {
 display:flex;
 justify-content:space-between;
 padding:10px;
 border-bottom:1px solid #e5e7eb;
}

.week-card {
 background:#f8fbff;
 border-radius:12px;
 padding:12px;
 margin-top:10px;
}

#schoolList div, #editSchoolList div {
 padding:10px;
 border-bottom:1px solid #eee;
 cursor:pointer;
}

/* 로딩 */
.loader {
 text-align:center;
 padding:20px;
 font-weight:bold;
 color:#2563eb;
}
</style>
</head>

<body>
<div class="container">

<h1 style="color:#2563eb;">KST HUB</h1>

<div id="loginPage" class="card">
<input id="userId" placeholder="아이디 (ufes숫자)">
<button onclick="login()">로그인</button>
</div>

<div id="setupPage" class="card" style="display:none;">
<input id="nickname" placeholder="닉네임">

<select id="gradeType">
<option value="">학교 등급</option>
<option>초등</option>
<option>중등</option>
<option>고등</option>
</select>

<input id="schoolInput" placeholder="학교 검색">
<div id="schoolList"></div>

<select id="grade">
<option>1학년</option><option>2학년</option><option>3학년</option>
<option>4학년</option><option>5학년</option><option>6학년</option>
</select>

<input id="classNum" type="number" placeholder="반">

<button onclick="saveProfile()">시작하기</button>
</div>

<div id="homePage" style="display:none;">

<div class="card">
<p id="welcome"></p>
<p id="schoolInfo"></p>
</div>

<div class="card">
<h4>🍱 오늘 급식</h4>
<div id="meal" class="meal-box"></div>

<button onclick="shareMealToday()">카톡 공유</button>
<button onclick="toggleWeekMeal()" id="mealBtn">일주일 급식 보기</button>
<div id="weekMeal"></div>
</div>

<div class="card">
<h4>📚 오늘 시간표</h4>
<div id="timetable"></div>

<button onclick="toggleWeekTime()" id="timeBtn">일주일 시간표 보기</button>
<div id="weekTime"></div>
</div>

<div class="card">
<button onclick="openMyPage()">마이페이지</button>
<button onclick="logout()">로그아웃</button>
</div>

</div>

<div id="mypage" class="card" style="display:none;">
<h3>마이페이지</h3>

<input id="editNickname">
<select id="editGradeType">
<option>초등</option><option>중등</option><option>고등</option>
</select>

<input id="editSchoolInput">
<div id="editSchoolList"></div>

<select id="editGrade">
<option>1학년</option><option>2학년</option><option>3학년</option>
<option>4학년</option><option>5학년</option><option>6학년</option>
</select>

<input id="editClassNum" type="number">

<button onclick="updateProfile()">정보 수정</button>
<button onclick="deleteAccount()" style="background:#ef4444;">계정 삭제</button>
<button onclick="closeMyPage()">닫기</button>
</div>

</div>

<script>
// 설정
const firebaseConfig = {
  apiKey: "AIzaSyDa50OQMq30K_6IcA-fm0IAUO8S8UYXe3E",
  authDomain: "ksthub-4840e.firebaseapp.com",
  projectId: "ksthub-4840e",
  storageBucket: "ksthub-4840e.firebasestorage.app",
  messagingSenderId: "688445578736",
  appId: "1:688445578736:web:6f1e29e1f3bae31c215135",
  measurementId: "G-VL8CNHLPL0"
};
const NEIS_API_KEY="19f78fd07bfb4243a6333e7bf4641bfc";
 
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

Kakao.init('1074f182720545c67909372a924b23bb');

// 로그인
async function login(){
 const btn = event.target;
 btn.classList.add("loading");

 const id = userId.value;

 if(!id){
  alert("아이디 입력");
  btn.classList.remove("loading");
  return;
 }

 const doc = await db.collection("users").doc(id).get();

 if(!doc.exists){
  loginPage.style.display="none";
  setupPage.style.display="block";
  window.currentUser=id;
 } else {
  localStorage.setItem("loginUser",id);
  loadHome(doc.data());
 }

 btn.classList.remove("loading");
}

// 자동로그인
window.onload = async()=>{
 const id=localStorage.getItem("loginUser");
 if(!id)return;

 const doc=await db.collection("users").doc(id).get();
 if(doc.exists) loadHome(doc.data());
};

// 학교 검색
let selectedSchool=null;

schoolInput.addEventListener("input",async()=>{
 const keyword=schoolInput.value;
 if(keyword.length<2)return;

 const res=await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${keyword}`);
 const data=await res.json();

 if(!data.schoolInfo)return;

 schoolList.innerHTML="";
 data.schoolInfo[1].row.forEach(s=>{
  const div=document.createElement("div");
  div.innerText=`${s.SCHUL_NM} (${s.LCTN_SC_NM})`;

  div.onclick=()=>{
   selectedSchool={
    name:s.SCHUL_NM,
    code:s.SD_SCHUL_CODE,
    office:s.ATPT_OFCDC_SC_CODE
   };
   schoolInput.value=s.SCHUL_NM;
   schoolList.innerHTML="";
  };

  schoolList.appendChild(div);
 });
});

// 저장
async function saveProfile(){
 if(!selectedSchool){
  alert("학교 선택");
  return;
 }

 const data={
  nickname:nickname.value,
  gradeType:gradeType.value,
  schoolName:selectedSchool.name,
  schoolCode:selectedSchool.code,
  officeCode:selectedSchool.office,
  grade:grade.value.replace("학년",""),
  classNum:classNum.value
 };

 await db.collection("users").doc(window.currentUser).set(data);
 localStorage.setItem("loginUser",window.currentUser);
 loadHome(data);
}

// 홈
function loadHome(user){
 currentUserData=user;

 loginPage.style.display="none";
 setupPage.style.display="none";
 homePage.style.display="block";

 welcome.innerText=user.nickname+"님 반가워요";
 schoolInfo.innerText=`${user.schoolName} ${user.grade}학년 ${user.classNum}반`;

 loadMeal(user);
 loadTimetable(user);
}

// 급식
async function loadMeal(user){
 meal.innerHTML="<div class='loader'>불러오는 중...</div>";

 const today=new Date().toISOString().slice(0,10).replace(/-/g,'');

 const res=await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${user.officeCode}&SD_SCHUL_CODE=${user.schoolCode}&MLSV_YMD=${today}`);
 const data=await res.json();

 if(!data.mealServiceDietInfo){
  meal.innerText="급식 없음"; return;
 }

 meal.innerHTML=data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/<br\/>/g,"<br>");
}

// 시간표
async function loadTimetable(user){
 timetable.innerHTML="<div class='loader'>불러오는 중...</div>";

 let type="hisTimetable";
 if(user.gradeType==="초등") type="elsTimetable";
 if(user.gradeType==="중등") type="misTimetable";

 const today=new Date().toISOString().slice(0,10).replace(/-/g,'');

 const res=await fetch(`https://open.neis.go.kr/hub/${type}?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${user.officeCode}&SD_SCHUL_CODE=${user.schoolCode}&ALL_TI_YMD=${today}&GRADE=${user.grade}&CLASS_NM=${user.classNum}`);
 const data=await res.json();

 if(!data[type]){
  timetable.innerText="시간표 없음"; return;
 }

 let html="";
 data[type][1].row.forEach(r=>{
  html+=`<div class="time-row"><span>${r.PERIO}교시</span><span>${r.ITRT_CNTNT}</span></div>`;
 });

 timetable.innerHTML=html;
}

// 공유
function shareMealToday(){
 Kakao.Share.sendDefault({
  objectType:'text',
  text:`${currentUserData.schoolName}\n오늘 급식 🍱\n\n${meal.innerText}`,
  link:{ mobileWebUrl:location.href, webUrl:location.href }
 });
}

// 기타
function logout(){
 localStorage.removeItem("loginUser");
 location.reload();
}
</script>

</body>
</html>
