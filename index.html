<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<style>
:root {
  --main:#0A84FF;
  --bg:#f2f4f8;
  --card:#fff;
  --text:#111;
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
}

.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#fff;
}

.header {
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:linear-gradient(135deg,#0A84FF,#5AC8FA);
  color:#fff;
}

.container {
  padding:20px;
  max-width:520px;
  margin:auto;
}

.card {
  background:var(--card);
  padding:16px;
  border-radius:18px;
  margin-bottom:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input, button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button {
  background:var(--main);
  color:#fff;
  border:none;
}

/* 작은 버튼 */
.smallBtn {
  width:auto;
  padding:6px 10px;
  font-size:12px;
  border-radius:10px;
  margin:4px 4px 0 0;
}

/* 시간표 */
.timetable {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.period {
  padding:10px;
  border-radius:12px;
  background:linear-gradient(135deg,#0A84FF,#5AC8FA);
  color:#fff;
  font-size:13px;
}

/* 슬라이드 */
.slide {
  animation:fade .25s ease;
}

@keyframes fade {
  from{opacity:0; transform:translateX(20px);}
  to{opacity:1; transform:translateX(0);}
}

/* 하단 바로가기 */
.footer {
  font-size:12px;
  text-align:center;
  opacity:0.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">KST HUB</div>

<!-- 로그인 -->
<div class="container" id="loginPage">
  <div class="card">
    <h3>로그인</h3>
    <input id="userId" placeholder="ufes1234">
    <button id="loginBtn">로그인</button>
  </div>
</div>

<!-- 설정 -->
<div class="container" id="setupPage" style="display:none">
  <div class="card">
    <h3>초기 설정</h3>

    <input id="schoolInput" placeholder="학교 검색" oninput="searchSchool()">
    <div id="schoolList"></div>

    <input id="grade" placeholder="학년">
    <input id="class" placeholder="반">

    <button onclick="saveInfo()">저장</button>
  </div>
</div>

<!-- 메인 -->
<div class="container" id="mainPage" style="display:none">

  <!-- 설정 수정 -->
  <div class="card">
    <button class="smallBtn" onclick="editInfo()">학교/학년/반 변경</button>
    <button class="smallBtn" onclick="toggleView()">이번주 보기</button>
  </div>

  <!-- 링크 -->
  <div class="card">
    <button onclick="go('https://www.u2math.co.kr/Login/Index')">유투엠</button>
    <button onclick="go('https://student.mathflat.com/#/login?_si=2')">매쓰플랫</button>
  </div>

  <!-- 급식 -->
  <div class="card">
    <h3>🍽 급식</h3>
    <div id="meal"></div>
  </div>

  <!-- 시간표 -->
  <div class="card">
    <h3>📚 시간표</h3>
    <div id="time"></div>
  </div>

  <div class="footer">
    KST HUB shortcuts
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyAIPlpSbUksGKrzxOX3fl4TKwXDClf7ba0",
  authDomain:"ksthub-3d6e6.firebaseapp.com",
  projectId:"ksthub-3d6e6",
  databaseURL:"https://ksthub-3d6e6-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc";

let user = localStorage.getItem("user");
let userData=null;
let viewWeek=false;
let schoolCode="", atpt="";

/* ================= 로그인 ================= */
window.login = async ()=>{
  const id = document.getElementById("userId").value;
  if(!id) return;

  user=id;
  localStorage.setItem("user",id);

  const snap = await get(ref(db,"users/"+id));

  if(snap.exists()){
    userData=snap.val();
    schoolCode=userData.schoolCode;
    atpt=userData.atpt;
    showMain();
  }else{
    document.getElementById("loginPage").style.display="none";
    document.getElementById("setupPage").style.display="block";
  }
};

document.getElementById("loginBtn").onclick=login;

/* ================= 설정 수정 ================= */
window.editInfo = ()=>{
  document.getElementById("setupPage").style.display="block";
  document.getElementById("mainPage").style.display="none";
};

/* ================= 보기 ================= */
window.toggleView = ()=>{
  viewWeek=!viewWeek;
  loadMeal();
  loadTime();
};

/* ================= 저장 ================= */
window.saveInfo = async ()=>{
  const grade=document.getElementById("grade").value;
  const classN=document.getElementById("class").value;

  await set(ref(db,"users/"+user),{
    schoolCode,atpt,grade,classN
  });

  userData={schoolCode,atpt,grade,classN};

  showMain();
};

/* ================= 메인 ================= */
function showMain(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("setupPage").style.display="none";
  document.getElementById("mainPage").style.display="block";

  loadMeal();
  loadTime();
}

/* ================= 날짜 ================= */
function today(){
  return new Date().toISOString().slice(0,10).replace(/-/g,'');
}

function weekDates(){
  const d=new Date();
  const day=d.getDay();
  const monday=new Date(d);
  monday.setDate(d.getDate()-(day===0?6:day-1));

  return [...Array(5)].map((_,i)=>{
    const x=new Date(monday);
    x.setDate(monday.getDate()+i);
    return x.toISOString().slice(0,10).replace(/-/g,'');
  });
}

/* ================= 급식 ================= */
async function loadMeal(){
  const el=document.getElementById("meal");

  const res=await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${atpt}&SD_SCHUL_CODE=${schoolCode}&MLSV_YMD=${today()}`);
  const data=await res.json();

  const meal=data.mealServiceDietInfo?.[1]?.row?.[0]?.DDISH_NM;

  el.innerHTML=meal?meal:"급식 없음";
}

/* ================= 시간표 (핵심 FIX) ================= */
async function loadTime(){
  const el=document.getElementById("time");
  el.classList.add("slide");

  if(!viewWeek){
    const res=await fetch(`https://open.neis.go.kr/hub/hisTimetable?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${atpt}&SD_SCHUL_CODE=${schoolCode}&GRADE=${userData.grade}&CLASS_NM=${userData.classN}&ALL_TI_YMD=${today()}`);
    const data=await res.json();

    const rows=data.hisTimetable?.[1]?.row;

    if(!rows){
      el.innerHTML="❌ 시간표 없음 (설정 확인)";
      return;
    }

    el.innerHTML=rows.map(r=>`
      <div class="period">${r.PERIO}교시<br>${r.ITRT_CNTNT}</div>
    `).join("");

    return;
  }

  const dates=weekDates();

  const result=await Promise.all(dates.map(async d=>{
    const res=await fetch(`https://open.neis.go.kr/hub/hisTimetable?KEY=${API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${atpt}&SD_SCHUL_CODE=${schoolCode}&GRADE=${userData.grade}&CLASS_NM=${userData.classN}&ALL_TI_YMD=${d}`);
    const data=await res.json();

    const rows=data.hisTimetable?.[1]?.row;

    const html=rows?rows.map(r=>`<div class="period">${r.PERIO}교시<br>${r.ITRT_CNTNT}</div>`).join(''):"없음";

    return `
      <div class="card">
        <b>${d.slice(4,6)}/${d.slice(6,8)}</b>
        <div class="timetable">${html}</div>
      </div>
    `;
  }));

  el.innerHTML=result.join("");
}

/* ================= 학교 검색 ================= */
window.searchSchool=async ()=>{
  const q=document.getElementById("schoolInput").value;
  if(q.length<2) return;

  const res=await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${API_KEY}&Type=json&SCHUL_NM=${q}`);
  const data=await res.json();

  const list=data.schoolInfo?.[1]?.row||[];

  const box=document.getElementById("schoolList");
  box.innerHTML="";

  list.forEach(s=>{
    const div=document.createElement("div");
    div.innerText=s.SCHUL_NM;
    div.onclick=()=>{
      schoolCode=s.SD_SCHUL_CODE;
      atpt=s.ATPT_OFCDC_SC_CODE;
      document.getElementById("schoolInput").value=s.SCHUL_NM;
      box.innerHTML="";
    };
    box.appendChild(div);
  });
};

/* ================= 기타 ================= */
window.go=(u)=>window.open(u);
window.toggleDark=()=>document.body.classList.toggle("dark");

window.login=login;

</script>

</body>
</html>
