<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<style>
body {
 font-family: Pretendard;
 background: linear-gradient(180deg,#eaf2ff,#ffffff);
 margin:0;
}

.container {
 max-width:420px;
 margin:auto;
 padding:16px;
}

/* 카드 */
.card {
 background:white;
 border-radius:18px;
 padding:18px;
 margin-top:14px;
 box-shadow:0 6px 18px rgba(0,80,255,0.08);
}

/* 입력 */
input, select, button {
 width:100%;
 height:48px;
 margin-top:10px;
 border-radius:12px;
 border:1px solid #dbeafe;
 box-sizing:border-box;
 font-size:15px;
}

/* 버튼 */
button {
 background:#2563eb;
 color:white;
 border:none;
 font-weight:600;
}

button:active {
 transform:scale(0.98);
}

/* 링크 버튼 */
.link-btn {
 background:#111;
}

/* 인사 */
#welcome {
 font-size:24px;
 font-weight:800;
 color:#1e3a8a;
}

/* 급식 */
.meal-box {
 background:#f1f5ff;
 border-radius:12px;
 padding:12px;
 margin-top:10px;
 line-height:1.6;
}

/* 시간표 */
.time-row {
 display:flex;
 justify-content:space-between;
 padding:10px;
 border-bottom:1px solid #e5e7eb;
}

/* 주간 */
.week-card {
 background:#f8fbff;
 border-radius:12px;
 padding:12px;
 margin-top:10px;
}

/* 학교 리스트 */
#schoolList div, #editSchoolList div {
 padding:10px;
 border-bottom:1px solid #eee;
 cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<h1 style="color:#2563eb;">KST HUB</h1>

<!-- 로그인 -->
<div id="loginPage" class="card">
<input id="userId" placeholder="아이디 (ufes숫자)">
<button onclick="login()">로그인</button>
</div>

<!-- 설정 -->
<div id="setupPage" class="card" style="display:none;">
<input id="nickname" placeholder="닉네임">

<select id="gradeType">
<option value="">학교 등급</option>
<option>초등</option>
<option>중등</option>
<option>고등</option>
</select>

<input id="schoolInput" placeholder="학교 검색">
<div id="schoolList"></div>

<select id="grade">
<option>1학년</option><option>2학년</option><option>3학년</option>
<option>4학년</option><option>5학년</option><option>6학년</option>
</select>

<input id="classNum" type="number" placeholder="반">

<button onclick="saveProfile()">시작하기</button>
</div>

<!-- 홈 -->
<div id="homePage" style="display:none;">

<div class="card">
<p id="welcome"></p>
<p id="schoolInfo"></p>
</div>

<div class="card">
<h4>🍱 오늘 급식</h4>
<div id="meal" class="meal-box"></div>

<button onclick="shareMealToday()">카톡 공유</button>

<button onclick="toggleWeekMeal()" id="mealBtn">일주일 급식 보기</button>
<div id="weekMeal"></div>
</div>

<div class="card">
<h4>📚 오늘 시간표</h4>
<div id="timetable"></div>

<button onclick="toggleWeekTime()" id="timeBtn">일주일 시간표 보기</button>
<div id="weekTime"></div>
</div>

<div class="card">
<button onclick="openMyPage()">마이페이지</button>
</div>

</div>

<!-- 마이페이지 -->
<div id="mypage" class="card" style="display:none;">
<h3>마이페이지</h3>

<input id="editNickname">

<select id="editGradeType">
<option>초등</option>
<option>중등</option>
<option>고등</option>
</select>

<input id="editSchoolInput">
<div id="editSchoolList"></div>

<select id="editGrade">
<option>1학년</option><option>2학년</option><option>3학년</option>
<option>4학년</option><option>5학년</option><option>6학년</option>
</select>

<input id="editClassNum" type="number">

<button onclick="updateProfile()">정보 수정</button>
<button onclick="deleteAccount()" style="background:#ef4444;">계정 삭제</button>
<button onclick="closeMyPage()">닫기</button>
</div>

</div>

<script>
// 🔥 설정
const firebaseConfig = {
  apiKey: "AIzaSyDa50OQMq30K_6IcA-fm0IAUO8S8UYXe3E",
  authDomain: "ksthub-4840e.firebaseapp.com",
  projectId: "ksthub-4840e",
  storageBucket: "ksthub-4840e.firebasestorage.app",
  messagingSenderId: "688445578736",
  appId: "1:688445578736:web:6f1e29e1f3bae31c215135",
  measurementId: "G-VL8CNHLPL0"
};
const NEIS_API_KEY="19f78fd07bfb4243a6333e7bf4641bfc";
 
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// 카카오 초기화
Kakao.init('1074f182720545c67909372a924b23bb');

// 이하 기존 코드 그대로 (login, loadMeal 등 동일)

// 🔥 카톡 공유 (오늘)
function shareMealToday(){
 const text = `${currentUserData.schoolName}
오늘 급식 🍱

${meal.innerText}

-KST HUB-`;

 Kakao.Share.sendDefault({
  objectType:'text',
  text:text,
  link:{
   mobileWebUrl:location.href,
   webUrl:location.href
  }
 });
}

// 🔥 주간 급식 (공유 버튼 포함)
async function loadWeekMeal(){
 const dates=getWeek();
 let html="";

 for(let d of dates){
  const res=await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${currentUserData.officeCode}&SD_SCHUL_CODE=${currentUserData.schoolCode}&MLSV_YMD=${d}`);
  const data=await res.json();

  let mealText="급식 없음";

  if(data.mealServiceDietInfo){
   mealText=data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/<br\/>/g,"<br>");
  }

  html+=`
  <div class="week-card">
  <b>${d.slice(4,6)}/${d.slice(6)}</b><br>
  ${mealText}
  <button onclick="shareMeal('${d}','${mealText.replace(/'/g,"")}')">공유</button>
  </div>
  `;
 }

 weekMeal.innerHTML=html;
}

// 🔥 날짜별 공유
function shareMeal(date, mealData){
 const text = `${currentUserData.schoolName}
${date.slice(4,6)}월 ${date.slice(6)}일 급식 🍱

${mealData.replace(/<br>/g,"\n")}

-KST HUB-`;

 Kakao.Share.sendDefault({
  objectType:'text',
  text:text,
  link:{
   mobileWebUrl:location.href,
   webUrl:location.href
  }
 });
}
</script>

</body>
</html>
