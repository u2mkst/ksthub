<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://developers.kakao.com/sdk/js/kakao.js"></script>

<style>
:root{
 --bg:#ffffff;
 --card:#ffffff;
 --text:#111;
 --primary:#2563eb;
}

.dark{
 --bg:#0f172a;
 --card:#1e293b;
 --text:#f1f5f9;
}

body{
 margin:0;
 font-family:Pretendard;
 background:var(--bg);
 color:var(--text);
 transition:0.3s;
}

.container{max-width:420px;margin:auto;padding:16px;}

.card{
 background:var(--card);
 border-radius:18px;
 padding:18px;
 margin-top:14px;
 box-shadow:0 6px 18px rgba(0,0,0,0.08);
 transition:0.3s;
}

input,select{
 width:100%;height:45px;margin-top:10px;
 border-radius:12px;border:1px solid #ddd;
}

button{
 width:100%;height:48px;margin-top:10px;
 border-radius:12px;border:none;
 background:var(--primary);color:white;
 font-weight:600;transition:0.2s;
}
button:active{transform:scale(0.96);}

.small-btn{
 height:36px;font-size:13px;
 background:#e5e7eb;color:#111;
}

.floating{
 position:fixed;bottom:20px;
 width:55px;height:55px;border-radius:50%;
 display:flex;align-items:center;justify-content:center;
 font-size:22px;color:white;
 box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
.share-btn{left:20px;background:#fbbf24;}
.dark-btn{right:20px;background:#111;}

.week-card{
 background:#f3f4f6;padding:10px;
 border-radius:10px;margin-top:10px;
}
.loader{text-align:center;padding:10px;}
</style>
</head>

<body>
<div class="container">

<h1>KST HUB</h1>

<div id="loginPage" class="card">
<input id="userId" placeholder="아이디 (ufes숫자)">
<button onclick="login()">로그인</button>
</div>

<div id="setupPage" class="card" style="display:none;">
<input id="nickname" placeholder="닉네임">
<select id="gradeType">
<option>초등</option><option>중등</option><option>고등</option>
</select>
<input id="schoolInput" placeholder="학교 검색">
<div id="schoolList"></div>
<select id="grade">
<option>1학년</option><option>2학년</option><option>3학년</option>
<option>4학년</option><option>5학년</option><option>6학년</option>
</select>
<input id="classNum" type="number" placeholder="반">
<button onclick="saveProfile()">시작하기</button>
</div>

<div id="homePage" style="display:none;">
<div class="card">
<p id="welcome"></p>
<p id="schoolInfo"></p>
</div>

<div class="card">
<h4>🍱 오늘 급식</h4>
<div id="meal"></div>
<button class="small-btn" onclick="toggleWeekMeal()">자세히 보기</button>
<div id="weekMeal"></div>
</div>

<div class="card">
<h4>📚 오늘 시간표</h4>
<div id="timetable"></div>
<button class="small-btn" onclick="toggleWeekTime()">자세히 보기</button>
<div id="weekTime"></div>
</div>

<div class="card">
<button onclick="openMyPage()">마이페이지</button>
<button onclick="logout()">로그아웃</button>
</div>
</div>

<div id="mypage" class="card" style="display:none;">
<h3>마이페이지</h3>
<input id="editNickname">
<button onclick="updateProfile()">수정</button>
<button onclick="deleteAccount()" style="background:red;">삭제</button>
<button onclick="closeMyPage()">닫기</button>
</div>

</div>

<div class="floating share-btn" onclick="openShare()">📤</div>
<div class="floating dark-btn" onclick="toggleDark()">🌙</div>

<script>
// 🔥 설정
const firebaseConfig = {
  apiKey: "AIzaSyDa50OQMq30K_6IcA-fm0IAUO8S8UYXe3E",
  authDomain: "ksthub-4840e.firebaseapp.com",
  projectId: "ksthub-4840e",
  storageBucket: "ksthub-4840e.firebasestorage.app",
  messagingSenderId: "688445578736",
  appId: "1:688445578736:web:6f1e29e1f3bae31c215135",
  measurementId: "G-VL8CNHLPL0"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const NEIS_API_KEY="19f78fd07bfb4243a6333e7bf4641bfc";
Kakao.init('1074f182720545c67909372a924b23bb');

// 로그인
async function login(){
 const id=userId.value;
 const doc=await db.collection("users").doc(id).get();

 if(!doc.exists){
  loginPage.style.display="none";
  setupPage.style.display="block";
  window.currentUser=id;
 }else{
  localStorage.setItem("loginUser",id);
  loadHome(doc.data());
 }
}

// 자동로그인
window.onload=async()=>{
 const id=localStorage.getItem("loginUser");
 if(!id)return;
 const doc=await db.collection("users").doc(id).get();
 if(doc.exists) loadHome(doc.data());
};

// 학교 자동완성
let selectedSchool=null;
schoolInput.addEventListener("input",async()=>{
 const res=await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${schoolInput.value}`);
 const data=await res.json();
 if(!data.schoolInfo)return;

 schoolList.innerHTML="";
 data.schoolInfo[1].row.forEach(s=>{
  const d=document.createElement("div");
  d.innerText=`${s.SCHUL_NM} (${s.LCTN_SC_NM})`;
  d.onclick=()=>{
   selectedSchool=s;
   schoolInput.value=s.SCHUL_NM;
   schoolList.innerHTML="";
  };
  schoolList.appendChild(d);
 });
});

// 저장
async function saveProfile(){
 const data={
  nickname:nickname.value,
  schoolName:selectedSchool.SCHUL_NM,
  schoolCode:selectedSchool.SD_SCHUL_CODE,
  officeCode:selectedSchool.ATPT_OFCDC_SC_CODE,
  grade:grade.value.replace("학년",""),
  classNum:classNum.value
 };

 await db.collection("users").doc(window.currentUser).set(data);
 localStorage.setItem("loginUser",window.currentUser);
 loadHome(data);
}

// 홈
function loadHome(u){
 currentUserData=u;
 loginPage.style.display="none";
 setupPage.style.display="none";
 homePage.style.display="block";

 welcome.innerText=u.nickname+"님 반가워요";
 schoolInfo.innerText=`${u.schoolName} ${u.grade}학년 ${u.classNum}반`;

 loadMeal();
 loadTimetable();
}

// 급식
async function loadMeal(){
 meal.innerHTML="로딩...";
 const today=new Date().toISOString().slice(0,10).replace(/-/g,'');

 const res=await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${currentUserData.officeCode}&SD_SCHUL_CODE=${currentUserData.schoolCode}&MLSV_YMD=${today}`);
 const data=await res.json();

 if(!data.mealServiceDietInfo){
  meal.innerText="없음";return;
 }
 meal.innerHTML=data.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/<br\/>/g,"<br>");
}

// 시간표
async function loadTimetable(){
 timetable.innerHTML="로딩...";
 const today=new Date().toISOString().slice(0,10).replace(/-/g,'');

 let type="hisTimetable";
 if(currentUserData.gradeType==="초등") type="elsTimetable";
 if(currentUserData.gradeType==="중등") type="misTimetable";

 const res=await fetch(`https://open.neis.go.kr/hub/${type}?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${currentUserData.officeCode}&SD_SCHUL_CODE=${currentUserData.schoolCode}&ALL_TI_YMD=${today}&GRADE=${currentUserData.grade}&CLASS_NM=${currentUserData.classNum}`);
 const data=await res.json();

 if(!data[type]){
  timetable.innerText="없음";return;
 }

 let html="";
 data[type][1].row.forEach(r=>{
  html+=`${r.PERIO}교시 - ${r.ITRT_CNTNT}<br>`;
 });
 timetable.innerHTML=html;
}

// 주간
let mealOpen=false;
function toggleWeekMeal(){
 if(mealOpen){weekMeal.innerHTML="";mealOpen=false;}
 else{loadWeekMeal();mealOpen=true;}
}

let timeOpen=false;
function toggleWeekTime(){
 if(timeOpen){weekTime.innerHTML="";timeOpen=false;}
 else{loadWeekTime();timeOpen=true;}
}

function getWeek(offset=0){
 const now=new Date();
 now.setDate(now.getDate()+offset*7);
 const monday=new Date(now.setDate(now.getDate()-now.getDay()+1));
 let arr=[];
 for(let i=0;i<5;i++){
  const d=new Date(monday);
  d.setDate(monday.getDate()+i);
  arr.push(d.toISOString().slice(0,10).replace(/-/g,''));
 }
 return arr;
}

async function loadWeekMeal(offset=0){
 const dates=getWeek(offset);
 let html=`<button onclick="loadWeekMeal(${offset-1})">◀</button>
           <button onclick="loadWeekMeal(${offset+1})">▶</button>`;

 for(let d of dates){
  html+=`<div class="week-card">${d}</div>`;
 }
 weekMeal.innerHTML=html;
}

async function loadWeekTime(offset=0){
 const dates=getWeek(offset);
 let html=`<button onclick="loadWeekTime(${offset-1})">◀</button>
           <button onclick="loadWeekTime(${offset+1})">▶</button>`;

 for(let d of dates){
  html+=`<div class="week-card">${d}</div>`;
 }
 weekTime.innerHTML=html;
}

// ✅ 카톡 공유 선택
function openShare(){
 const choice=prompt("1. 오늘 급식\n2. 이번주 급식\n3. 링크");

 if(choice=="1") shareToday();
 else if(choice=="2") shareWeek();
 else if(choice=="3") shareLink();
}

function shareToday(){
 Kakao.Share.sendDefault({
  objectType:'text',
  text:`${currentUserData.schoolName}\n오늘 급식\n${meal.innerText}`,
  link:{mobileWebUrl:location.href,webUrl:location.href}
 });
}

async function shareWeek(){
 const dates=getWeek();
 let text="이번 주 급식\n";
 for(let d of dates){ text+=`\n${d}`; }

 Kakao.Share.sendDefault({
  objectType:'text',
  text:text,
  link:{mobileWebUrl:location.href,webUrl:location.href}
 });
}

function shareLink(){
 Kakao.Share.sendDefault({
  objectType:'text',
  text:`KST HUB\n${location.href}`,
  link:{mobileWebUrl:location.href,webUrl:location.href}
 });
}

// 다크모드
function toggleDark(){
 document.body.classList.toggle("dark");
}

// 마이페이지
function openMyPage(){mypage.style.display="block";}
function closeMyPage(){mypage.style.display="none";}

// 수정/삭제
async function updateProfile(){
 await db.collection("users").doc(localStorage.getItem("loginUser")).update({
  nickname:editNickname.value
 });
 alert("수정 완료");
}

async function deleteAccount(){
 await db.collection("users").doc(localStorage.getItem("loginUser")).delete();
 localStorage.removeItem("loginUser");
 location.reload();
}

// 로그아웃
function logout(){
 localStorage.removeItem("loginUser");
 location.reload();
}
</script>

</body>
</html>
