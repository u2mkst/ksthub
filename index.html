<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학교 앱</title>

<style>
body{
  margin:0;
  font-family: sans-serif;
  background:#f4f6f8;
}

/* 상단 */
header{
  background:#4f46e5;
  color:white;
  padding:15px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* 카드 */
.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 버튼 */
button{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.small-btn{
  font-size:12px;
  padding:5px 8px;
}

/* 슬라이드 */
.slide{
  animation: slideIn 0.3s ease;
}
@keyframes slideIn{
  from{transform:translateX(20px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}

/* 하단 링크 */
.bottom-links{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:8px;
  border-top:1px solid #ddd;
  font-size:12px;
}

.link{
  color:#4f46e5;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>📚 학교 앱</div>
  <button onclick="openSettings()">⚙️</button>
</header>

<div id="app"></div>

<!-- 하단 링크 -->
<div class="bottom-links">
  <div class="link" onclick="show('timetable')">시간표</div>
  <div class="link" onclick="show('meal')">급식</div>
  <div class="link" onclick="show('home')">홈</div>
</div>

<script>
/* =========================
   사용자 데이터
========================= */
let userData = JSON.parse(localStorage.getItem("userData")) || {
  schoolCode:"",
  atpt:"",
  grade:"1",
  classN:"1"
};

/* =========================
   API KEY
========================= */
const API_KEY = "YOUR_NEIS_KEY";

/* =========================
   화면 상태
========================= */
let current = "home";

/* =========================
   화면 전환
========================= */
function show(page){
  current = page;
  render();
}

/* =========================
   설정
========================= */
function openSettings(){
  const html = `
    <div class="card slide">
      <h3>⚙️ 설정</h3>

      학교코드<br>
      <input id="schoolCode" value="${userData.schoolCode}"><br><br>

      교육청코드<br>
      <input id="atpt" value="${userData.atpt}"><br><br>

      학년<br>
      <input id="grade" value="${userData.grade}"><br><br>

      반<br>
      <input id="classN" value="${userData.classN}"><br><br>

      <button onclick="saveSettings()">저장</button>
    </div>
  `;
  document.getElementById("app").innerHTML = html;
}

function saveSettings(){
  userData.schoolCode = document.getElementById("schoolCode").value;
  userData.atpt = document.getElementById("atpt").value;
  userData.grade = document.getElementById("grade").value;
  userData.classN = document.getElementById("classN").value;

  localStorage.setItem("userData", JSON.stringify(userData));

  alert("저장 완료");
  show("home");
}

/* =========================
   날짜 (이번주)
========================= */
function getWeekDates(){
  const today = new Date();
  const day = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));

  let arr = [];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    arr.push(d.toISOString().slice(0,10).replace(/-/g,""));
  }
  return arr;
}

/* =========================
   시간표
========================= */
async function loadTimetable(){
  const dates = getWeekDates();

  let html = `<div class="card slide">
    <h3>📅 이번주 시간표</h3>
    <button class="small-btn" onclick="loadTimetable()">새로고침</button>
  </div>`;

  for(const date of dates){

    const grade = String(userData.grade).trim();
    const classN = String(userData.classN).replace(/[^0-9]/g,'');

    const url =
`https://open.neis.go.kr/hub/hisTimetable?KEY=${API_KEY}&Type=json
&ATPT_OFCDC_SC_CODE=${userData.atpt}
&SD_SCHUL_CODE=${userData.schoolCode}
&GRADE=${grade}
&CLASS_NM=${classN}
&ALL_TI_YMD=${date}`;

    try{
      const res = await fetch(url);
      const data = await res.json();

      const rows = data?.hisTimetable?.[1]?.row;

      html += `<div class="card slide">
        <b>${date.slice(4,6)}/${date.slice(6,8)}</b><br>`;

      if(!rows){
        html += `<div style="opacity:0.6">시간표 없음</div>`;
      } else {
        rows.forEach(r=>{
          html += `${r.PERIO}교시 - ${r.ITRT_CNTNT}<br>`;
        });
      }

      html += `</div>`;

    }catch(e){
      html += `<div class="card">오류</div>`;
    }
  }

  document.getElementById("app").innerHTML = html;
}

/* =========================
   급식 (주간)
========================= */
async function loadMeal(){
  const dates = getWeekDates();

  let html = `<div class="card slide">
    <h3>🍱 이번주 급식</h3>
  </div>`;

  for(const date of dates){

    const url =
`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${API_KEY}&Type=json
&ATPT_OFCDC_SC_CODE=${userData.atpt}
&SD_SCHUL_CODE=${userData.schoolCode}
&MLSV_YMD=${date}`;

    try{
      const res = await fetch(url);
      const data = await res.json();

      const row = data?.mealServiceDietInfo?.[1]?.row?.[0];

      html += `<div class="card slide">
        <b>${date.slice(4,6)}/${date.slice(6,8)}</b><br>`;

      if(!row){
        html += `급식 없음`;
      } else {
        html += row.DDISH_NM.replace(/\<br\/>/g,"<br>");
      }

      html += `</div>`;

    }catch(e){
      html += `<div class="card">오류</div>`;
    }
  }

  document.getElementById("app").innerHTML = html;
}

/* =========================
   홈
========================= */
function home(){
  document.getElementById("app").innerHTML = `
    <div class="card slide">
      <h3>🏫 홈</h3>
      <button onclick="show('timetable')">시간표 보기</button>
      <button onclick="show('meal')">급식 보기</button>
    </div>
  `;
}

/* =========================
   렌더
========================= */
function render(){
  if(current==="home") home();
  if(current==="timetable") loadTimetable();
  if(current==="meal") loadMeal();
}

render();
</script>

</body>
</html>
