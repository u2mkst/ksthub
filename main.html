<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f1f5f9;
}

/* 카드 */
.card {
    background:white;
    margin:15px;
    padding:18px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.05);
    animation:fadeUp 0.5s;
}

@keyframes fadeUp {
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

/* 급식 카드 */
.meal { background:#fdebd3; }

/* 시간표 카드 */
.time { background:#dbeafe; }

/* 하단 탭 */
.tabbar {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #ddd;
}

.tabbar div {
    text-align:center;
    font-size:12px;
    color:#64748b;
}

.active { color:#2563eb; font-weight:bold; }

/* 검색 */
.search-box {
    margin:20px;
}
input {
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
}
.result {
    background:white;
    border-radius:10px;
    margin-top:5px;
}
.result div {
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<!-- 유저 -->
<div class="card">
    <h2 id="nickname">...</h2>
    <div id="school"></div>
</div>

<!-- 학교 검색 -->
<div class="search-box">
    <input placeholder="학교 검색" oninput="searchSchool(this.value)">
    <div id="results" class="result"></div>
</div>

<!-- 행운 -->
<div class="card">
    <h3>🍀 오늘의 행운</h3>
    <h1 id="luck"></h1>
</div>

<!-- 급식 -->
<div class="card meal">
    <h3>🍱 오늘 급식</h3>
    <div id="meal">로딩중...</div>
</div>

<!-- 시간표 -->
<div class="card time">
    <h3>📘 오늘 시간표</h3>
    <div id="timetable">로딩중...</div>
</div>

<!-- 하단 탭 -->
<div class="tabbar">
    <div class="active">홈</div>
    <div onclick="location.href='point.html'">포인트</div>
    <div onclick="location.href='plant.html'">식물</div>
    <div onclick="location.href='today.html'">오늘</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAIPlpSbUksGKrzxOX3fl4TKwXDClf7ba0",
  authDomain: "ksthub-3d6e6.firebaseapp.com",
  projectId: "ksthub-3d6e6",
  storageBucket: "ksthub-3d6e6.firebasestorage.app",
  messagingSenderId: "951582864781",
  appId: "1:951582864781:web:00a537f9561b988339f9c4",
  measurementId: "G-9KPZDH8RWJ"
};
const NEIS_API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc";

firebase.initializeApp(firebaseConfig);

let userData;

// 로그인 체크
firebase.auth().onAuthStateChanged(user=>{
    if(!user){
        location.href="index.html";
        return;
    }

    firebase.database().ref("users/"+user.uid).once("value")
    .then(s=>{
        let d = s.val();

        if(!d){
            d = {
                nickname:"새 사용자",
                schoolName:"학교 없음",
                grade:1
            };
            firebase.database().ref("users/"+user.uid).set(d);
        }

        userData = d;

        nickname.innerText = d.nickname;
        school.innerText = d.schoolName;

        luck.innerText = Math.floor(Math.random()*100)+"점";

        loadMeal();
        loadTime();
    });
});

// 날짜
function today(){
    return new Date().toISOString().slice(0,10).replace(/-/g,"");
}

// 학교 검색
async function searchSchool(q){
    if(q.length < 2){ results.innerHTML=""; return;}

    const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${q}`);
    const data = await res.json();

    if(!data.schoolInfo){ results.innerHTML="없음"; return;}

    let html="";
    data.schoolInfo[1].row.slice(0,5).forEach(s=>{
        html += `<div onclick="selectSchool('${s.SCHUL_NM}')">
            ${s.SCHUL_NM} (${s.LCTN_SC_NM})
        </div>`;
    });

    results.innerHTML = html;
}

function selectSchool(name){
    userData.schoolName = name;
    school.innerText = name;
    results.innerHTML = "";

    firebase.database().ref("users/"+firebase.auth().currentUser.uid).update({
        schoolName:name
    });

    loadMeal();
    loadTime();
}

// 급식
async function loadMeal(){
    const s = await getSchool();
    if(!s){ meal.innerText="없음"; return;}

    const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${s.ATPT}&SD_SCHUL_CODE=${s.SD}&MLSV_YMD=${today()}`);
    const d = await res.json();

    if(!d.mealServiceDietInfo){
        meal.innerText="급식 없음";
        return;
    }

    meal.innerHTML = d.mealServiceDietInfo[1].row[0].DDISH_NM.replace(/<br\/>/g,"<br>");
}

// 시간표
async function loadTime(){
    const s = await getSchool();
    if(!s){ timetable.innerText="없음"; return;}

    const res = await fetch(`https://open.neis.go.kr/hub/hisTimetable?KEY=${NEIS_API_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${s.ATPT}&SD_SCHUL_CODE=${s.SD}&ALL_TI_YMD=${today()}&GRADE=${userData.grade}`);
    const d = await res.json();

    if(!d.hisTimetable){
        timetable.innerText="시간표 없음";
        return;
    }

    let html="";
    d.hisTimetable[1].row.forEach(r=>{
        html += `${r.PERIO}교시 ${r.ITRT_CNTNT}<br>`;
    });

    timetable.innerHTML = html;
}

// 학교코드
async function getSchool(){
    const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${NEIS_API_KEY}&Type=json&SCHUL_NM=${userData.schoolName}`);
    const d = await res.json();
    if(!d.schoolInfo) return null;

    const s = d.schoolInfo[1].row[0];
    return {ATPT:s.ATPT_OFCDC_SC_CODE, SD:s.SD_SCHUL_CODE};
}
</script>

</body>
</html>
