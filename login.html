<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KST HUB</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: sans-serif;
    background: linear-gradient(180deg, #eef4ff, #f8fafc);
}

.app {
    max-width: 420px;
    margin: auto;
}

.header {
    background: white;
    padding: 18px;
    text-align: center;
    font-weight: bold;
    color: #2563eb;
    border-bottom: 2px solid #2563eb;
}

/* 카드 애니메이션 */
.card {
    background: white;
    margin: 20px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

/* 입력 */
input, select {
    width: 100%;
    height: 44px;
    padding: 0 12px;
    margin-top: 8px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    transition: 0.2s;
}

input:focus, select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    transform: scale(1.02);
    outline: none;
}

/* 버튼 */
button {
    width: 100%;
    height: 46px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

button:active {
    transform: scale(0.95);
}

/* 링크 */
.footer {
    text-align: center;
    color: #2563eb;
    cursor: pointer;
    margin-top: 10px;
}

/* 학교 리스트 */
#schoolList {
    position:absolute;
    width:100%;
    background:white;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    max-height:200px;
    overflow-y:auto;
    display:none;
    z-index:10;
}

#schoolList div {
    padding:12px;
    border-bottom:1px solid #f1f5f9;
}

#schoolList div:hover {
    background:#eff6ff;
}

.school-sub {
    font-size:12px;
    color:#64748b;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="app">
    <div class="header">📘 KST HUB</div>

    <!-- 로그인 -->
    <div class="card" id="loginPage">
        <input id="loginId" placeholder="아이디">
        <input id="loginPw" type="password" placeholder="비밀번호">
        <button onclick="login()">로그인</button>
        <div class="footer" onclick="showRegister()">회원가입</div>
    </div>

    <!-- 회원가입 -->
    <div class="card hidden" id="registerPage">

        <input id="name" placeholder="이름">
        <input id="nickname" placeholder="닉네임">

        <input id="userId" placeholder="아이디">
        <input id="password" type="password" placeholder="비밀번호">

        <select id="schoolType">
            <option value="">학교 종류</option>
            <option value="초등학교">초등학교</option>
            <option value="중학교">중학교</option>
            <option value="고등학교">고등학교</option>
        </select>

        <div style="position:relative;">
            <input id="schoolSearch" placeholder="학교 검색">
            <div id="schoolList"></div>
        </div>

        <select id="grade"></select>

        <input id="classInput" placeholder="반">

        <select id="teacher">
            <option value="">담당 선생님 선택</option>
            <option>김선생</option>
            <option>이선생</option>
            <option>박선생</option>
        </select>

        <button onclick="register()">가입하기</button>
        <div class="footer" onclick="showLogin()">로그인으로</div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAIPlpSbUksGKrzxOX3fl4TKwXDClf7ba0",
  authDomain: "ksthub-3d6e6.firebaseapp.com",
  projectId: "ksthub-3d6e6",
  storageBucket: "ksthub-3d6e6.firebasestorage.app",
  messagingSenderId: "951582864781",
  appId: "1:951582864781:web:00a537f9561b988339f9c4",
  measurementId: "G-9KPZDH8RWJ"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 자동 로그인
auth.onAuthStateChanged(user => {
    if(user){
        location.href = "main.html";
    }
});

// 화면 전환
function showRegister(){
    loginPage.classList.add("hidden");
    registerPage.classList.remove("hidden");
}
function showLogin(){
    loginPage.classList.remove("hidden");
    registerPage.classList.add("hidden");
}

// 학년 자동 변경 🔥
const gradeSelect = document.getElementById("grade");

function updateGradeOptions(type){
    gradeSelect.innerHTML = "";

    let max = 3;
    if(type === "초등학교") max = 6;

    for(let i=1;i<=max;i++){
        const opt = document.createElement("option");
        opt.value = i;
        opt.innerText = i + "학년";
        gradeSelect.appendChild(opt);
    }
}

// 학교 종류 변경 감지
schoolType.addEventListener("change", ()=>{
    updateGradeOptions(schoolType.value);
});

// 초기값
updateGradeOptions("중학교");

// 닉네임 생성
function makeUfesTag(){
    return "ufes" + Math.floor(1000 + Math.random() * 9000);
}

// 회원가입
function register(){
    const email = userId.value + "@kst.com";
    const nicknameFinal = nickname.value + " (" + makeUfesTag() + ")";

    auth.createUserWithEmailAndPassword(email, password.value)
    .then(user=>{
        db.ref("users/"+user.user.uid).set({
            name: name.value,
            nickname: nicknameFinal,
            teacher: teacher.value,
            schoolType: schoolType.value,
            schoolName: schoolSearch.value,
            grade: grade.value,
            className: classInput.value
        });

        alert("가입 완료!");
        showLogin();
    });
}

// 로그인
function login(){
    const email = loginId.value + "@kst.com";

    auth.signInWithEmailAndPassword(email, loginPw.value)
    .then(()=>{
        location.href = "main.html";
    });
}

// 학교 검색
const API_KEY = "19f78fd07bfb4243a6333e7bf4641bfc";

let timeout;
schoolSearch.addEventListener("input", ()=>{
    clearTimeout(timeout);

    const keyword = schoolSearch.value.trim();
    if(keyword.length < 2){
        schoolList.style.display="none";
        return;
    }

    timeout = setTimeout(()=>{
        fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${API_KEY}&Type=json&pSize=10&SCHUL_NM=${keyword}`)
        .then(res=>res.json())
        .then(data=>{
            schoolList.innerHTML="";

            if(!data.schoolInfo) return;

            data.schoolInfo[1].row.forEach(s=>{
                const div = document.createElement("div");

                div.innerHTML = `
                    <div>${s.SCHUL_NM}</div>
                    <div class="school-sub">
                        ${s.ATPT_OFCDC_SC_NM} · ${s.SCHUL_KND_SC_NM}
                    </div>
                `;

                div.onclick=()=>{
                    schoolSearch.value = s.SCHUL_NM;
                    schoolType.value = s.SCHUL_KND_SC_NM;
                    updateGradeOptions(s.SCHUL_KND_SC_NM);
                    schoolList.style.display="none";
                };

                schoolList.appendChild(div);
            });

            schoolList.style.display="block";
        });
    },300);
});
</script>

</body>
</html>
